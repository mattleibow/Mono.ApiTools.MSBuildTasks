name: Release

on:
  release:
    types: [ published ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.x'
  CONFIGURATION: 'release'

jobs:

  pack:
    name: Pack
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - run: dotnet tool restore
    - name: Pack NuGets
      shell: pwsh
      run: |
        $VERSION = $env:GITHUB_REF.Substring($env:GITHUB_REF.LastIndexOf('/') + 1)
        echo "PACKAGE VERSION: $VERSION"
        dotnet pack Mono.ApiTools.MSBuildTasks/Mono.ApiTools.MSBuildTasks.csproj --configuration ${{ env.CONFIGURATION }} -p:PackageVersion=$VERSION
    - name: Upload NuGet artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget
        path: artifacts/package/release

  publish:
    name: Publish NuGet Packages
    needs: pack
    runs-on: windows-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: nuget
        path: artifacts
    - run: dir artifacts
    - name: NuGet login (OIDC)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: NuGet push
      run: dotnet nuget push artifacts\*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
